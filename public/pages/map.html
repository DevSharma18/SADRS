<!-- Map View Page -->
<div class="page-header">
    <h2>ATM Map View</h2>
    <p>Geographic visualization of all ATM locations</p>
</div>

<div class="filters" style="margin-bottom: var(--spacing-lg);">
    <div class="filter-group">
        <label>Filter by Status</label>
        <select id="mapStatusFilter" onchange="filterMapMarkers()">
            <option value="">All Statuses</option>
            <option value="online">Online</option>
            <option value="offline">Offline</option>
            <option value="maintenance">Maintenance</option>
        </select>
    </div>
    <div class="filter-group">
        <label>Show Alerts</label>
        <select id="mapAlertsFilter" onchange="filterMapMarkers()">
            <option value="">All ATMs</option>
            <option value="alerts">Only with Alerts</option>
            <option value="no-alerts">No Alerts</option>
        </select>
    </div>
</div>

<div class="table-container">
    <div class="table-header">
        <h3 class="table-title">ATM Locations Map</h3>
        <div class="table-actions">
            <button class="btn btn-sm btn-secondary" onclick="centerMap()">Center Map</button>
            <button class="btn btn-sm btn-secondary" onclick="fitAllMarkers()">Fit All</button>
        </div>
    </div>
    <div id="mapContainer" style="height: 600px; background: var(--bg-tertiary); position: relative; overflow: hidden;">
        <!-- Simple pseudo-map with markers -->
        <div id="pseudoMap"
            style="width: 100%; height: 100%; position: relative; background: linear-gradient(135deg, #1a2332 0%, #0a0e27 100%);">
            <div id="mapMarkers"></div>
        </div>
    </div>
</div>

<!-- ATM Details Sidebar -->
<div id="atmDetailsSidebar" class="atm-sidebar" style="display: none;">
    <div class="atm-sidebar-header">
        <h3 id="sidebarTitle">ATM Details</h3>
        <button onclick="closeATMSidebar()"
            style="background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer;">&times;</button>
    </div>
    <div id="sidebarContent" style="padding: var(--spacing-lg);"></div>
</div>
